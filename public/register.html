<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Online Registration Form | UCAGS</title>
  <link rel="icon" href="/favicon.png" />

  <style>
    :root {
      /* DESIGN SYSTEM */
      --bg: #ffffff;
      --text: #101828;
      --muted: #475467;

      /* Primary color: crm purple (existing brand purple used in CRM) */
      --primary: #592c88;
      --primary-hover: #4b2376;

      /* Accent color: crm match suitable (gold-ish accent used in UCAGS assets) */
      --accent: #c89b3c;

      --input-border: #cccccc;
      --radius: 10px;
      --radius-input: 8px;

      --container: 650px;

      --shadow: 0 16px 40px rgba(16, 24, 40, 0.10);
      --ring: 0 0 0 4px rgba(89, 44, 136, 0.14);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, "Noto Sans", "Apple Color Emoji", "Segoe UI Emoji";
      font-weight: 500;
      line-height: 1.4;
    }

    .page {
      min-height: 100%;
      padding: 0 16px 56px;
      display: grid;
      place-items: start center;
      background:
        radial-gradient(900px 420px at 10% -10%, rgba(89, 44, 136, 0.10), transparent 60%),
        radial-gradient(850px 420px at 95% 0%, rgba(200, 155, 60, 0.10), transparent 55%),
        linear-gradient(180deg, #ffffff 0%, #fbfaff 100%);
    }

    /* Apple-like fluid + glass header */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      width: 100%;
      margin: 0 -16px 18px;
      padding: 18px 16px;
      background:
        radial-gradient(900px 420px at 15% 0%, rgba(200, 155, 60, 0.20), transparent 55%),
        radial-gradient(900px 420px at 85% 20%, rgba(123, 59, 214, 0.30), transparent 60%),
        linear-gradient(135deg, rgba(89, 44, 136, 0.78), rgba(75, 35, 118, 0.78));
      color: #fff;
      backdrop-filter: saturate(180%) blur(18px);
      -webkit-backdrop-filter: saturate(180%) blur(18px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow: 0 18px 40px rgba(16, 24, 40, 0.16);
    }

    .topbar .inner {
      width: 100%;
      max-width: var(--container);
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .topbar img {
      width: min(520px, 92vw);
      max-height: 90px;
      height: auto;
      object-fit: contain;
      display: block;
      filter: drop-shadow(0 12px 22px rgba(0,0,0,0.22));
    }

    @media (min-width: 720px) {
      .topbar { padding: 22px 16px; }
      .topbar img { max-height: 110px; }
    }

    .wrap {
      width: 100%;
      max-width: var(--container);
    }

    /* TITLE SECTION */
    .header {
      text-align: left;
      padding: 18px 6px 22px;
    }

    .header .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(89, 44, 136, 0.80);
    }

    .header .eyebrow::before {
      content: "";
      width: 38px;
      height: 2px;
      border-radius: 2px;
      background: linear-gradient(90deg, var(--accent), rgba(89, 44, 136, 0.85));
    }

    .header h1 {
      margin: 10px 0 0;
      font-size: clamp(34px, 5.6vw, 54px);
      letter-spacing: -0.8px;
      color: #101828;
      font-weight: 900;
      line-height: 1.05;
    }

    .header .subtitle {
      margin: 10px 0 0;
      font-size: 15px;
      color: var(--muted);
      font-weight: 600;
      max-width: 52ch;
    }

    /* FORM CONTAINER */
    .card {
      background: #ffffff;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid rgba(16, 24, 40, 0.08);
      padding: 26px;
    }

    @media (max-width: 520px) {
      .card { padding: 22px 18px; }
    }

    form {
      display: grid;
      gap: 18px; /* 16–20px spacing between fields */
    }

    .field {
      display: grid;
      gap: 8px;
    }

    label {
      font-size: 14px;
      font-weight: 700;
      color: #1d2939;
    }

    .req {
      color: #b42318;
      font-weight: 900;
      margin-left: 2px;
    }

    input, select {
      width: 100%;
      height: 44px;
      padding: 10px 12px;
      border: 1px solid var(--input-border);
      border-radius: var(--radius-input);
      font-size: 14px;
      font-weight: 500;
      background: #fff;
      outline: none;
    }

    input:focus, select:focus {
      border-color: rgba(89, 44, 136, 0.55);
      box-shadow: var(--ring);
    }

    input::placeholder { color: rgba(71, 84, 103, 0.75); }

    .two {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
    }

    @media (min-width: 640px) {
      .two { grid-template-columns: 1fr 1fr; }
    }

    /* Confirmation */
    .confirm {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      padding: 12px 12px;
      border: 1px solid rgba(89, 44, 136, 0.18);
      background: rgba(89, 44, 136, 0.04);
      border-radius: 10px;
    }

    .confirm input[type="checkbox"] {
      width: 18px;
      height: 18px;
      margin-top: 2px;
      accent-color: var(--primary);
    }

    .confirm label {
      font-weight: 600;
      color: #344054;
      line-height: 1.35;
    }

    /* Submit */
    .actions {
      display: flex;
      justify-content: flex-end;
      padding-top: 4px;
    }

    .btn {
      height: 46px;
      padding: 0 18px;
      border: 0;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 800;
      background: var(--primary);
      color: #fff;
      transition: background 120ms ease, transform 120ms ease, box-shadow 120ms ease;
      width: 100%;
      max-width: 340px; /* medium width on desktop */
    }

    .btn:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
      box-shadow: 0 12px 24px rgba(89, 44, 136, 0.20);
    }

    .btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* Status messages */
    .status {
      display: none;
      padding: 12px 12px;
      border-radius: 10px;
      font-size: 13px;
      line-height: 1.45;
    }

    .status.ok {
      display: block;
      background: #ecfdf3;
      color: #067647;
      border: 1px solid #abefc6;
    }

    .status.err {
      display: block;
      background: #fef3f2;
      color: #b42318;
      border: 1px solid #fecdca;
    }

    .footer {
      text-align: center;
      color: rgba(16, 24, 40, 0.60);
      font-size: 12.5px;
      padding: 18px 6px 0;
    }

    .footer a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 700;
    }

    .footer a:hover { text-decoration: underline; }
  </style>
</head>

<body>
  <div class="page">
    <div class="topbar" role="banner" aria-label="UCAGS">
      <div class="inner">
        <img src="/ucags_register_files/Unversal-logo-2025-05-16.png" alt="UCAGS" />
      </div>
    </div>

    <div class="wrap">
      <header class="header">
        <div class="eyebrow">Quick &amp; Easy</div>
        <h1>Registration</h1>
        <div class="subtitle">Complete the form below. Fields marked with <span class="req">*</span> are required.</div>
      </header>

      <section class="card" aria-label="Online Registration Form">
        <form id="registrationForm" novalidate>
          <div class="field">
            <label for="fullName">Full Name<span class="req">*</span></label>
            <input id="fullName" name="name" type="text" autocomplete="name" required />
          </div>

          <div class="two">
            <div class="field">
              <label for="gender">Gender</label>
              <select id="gender" name="gender">
                <option value="">Select Gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
              </select>
            </div>

            <div class="field">
              <label for="dob">Date of Birth<span class="req">*</span></label>
              <input id="dob" name="date_of_birth" type="date" required />
            </div>
          </div>

          <div class="field">
            <label for="address">Address<span class="req">*</span></label>
            <input id="address" name="address" type="text" autocomplete="street-address" required />
          </div>

          <div class="field">
            <label for="country">Country<span class="req">*</span></label>
            <input id="country" name="country" type="text" autocomplete="country-name" required />
          </div>

          <div class="two">
            <div class="field">
              <label for="phone">Phone Number<span class="req">*</span></label>
              <input id="phone" name="phone_number" type="tel" autocomplete="tel" required />
            </div>

            <div class="field">
              <label for="whatsapp">WhatsApp Number</label>
              <input id="whatsapp" name="wa_number" type="tel" autocomplete="tel" />
            </div>
          </div>

          <div class="field">
            <label for="email">Email Address<span class="req">*</span></label>
            <input id="email" name="email" type="email" autocomplete="email" required />
          </div>

          <div class="two">
            <div class="field">
              <label for="workingStatus">Working Status</label>
              <select id="workingStatus" name="working_status">
                <option value="">Select Working Status</option>
                <option value="Working">Working</option>
                <option value="Student">Student</option>
              </select>
            </div>

            <div class="field">
              <label for="course">Course / Program<span class="req">*</span></label>
              <select id="course" name="course_program" required>
                <option value="">Select Your Course / Program</option>
                <option value="Diploma in Psychology">Diploma in Psychology</option>
                <option value="Diploma in Business Management">Diploma in Business Management</option>
                <option value="Diploma in Information Technology">Diploma in Information Technology</option>
                <option value="Diploma in Digital Marketing">Diploma in Digital Marketing</option>
                <option value="Diploma in Human Resource Management">Diploma in Human Resource Management</option>
                <option value="Other">Other (specify in notes)</option>
              </select>
            </div>
          </div>

          <div class="confirm">
            <input id="confirmCourse" name="confirm_interest" type="checkbox" required />
            <label for="confirmCourse">
              I am interested to join the above selected Course/Program<span class="req">*</span>
            </label>
          </div>

          <div id="status" class="status" role="status" aria-live="polite"></div>

          <div class="actions">
            <button id="submitBtn" class="btn" type="submit">Submit</button>
          </div>
        </form>
      </section>

      <div class="footer">Copyright © <span id="year"></span> UCAGS. All rights reserved.</div>
    </div>
  </div>

  <script>
    const form = document.getElementById('registrationForm');
    const statusEl = document.getElementById('status');
    const submitBtn = document.getElementById('submitBtn');

    document.getElementById('year').textContent = new Date().getFullYear();

    function setStatus(type, message) {
      statusEl.className = `status ${type}`;
      statusEl.textContent = message;
    }

    function clearStatus() {
      statusEl.className = 'status';
      statusEl.textContent = '';
      statusEl.style.display = 'none';
      // Re-apply display via classes for ok/err
      statusEl.removeAttribute('style');
    }

    function normalizePhone(value) {
      if (!value) return '';
      return String(value).trim();
    }

    function validate(payload) {
      if (!payload.name) return 'Please enter your full name.';
      if (!payload.date_of_birth) return 'Please select your date of birth.';
      if (!payload.address) return 'Please enter your address.';
      if (!payload.country) return 'Please enter your country.';

      const phone = normalizePhone(payload.phone_number);
      if (!phone) return 'Please enter your phone number.';
      if (phone.replace(/\D/g, '').length < 9) return 'Please enter a valid phone number.';

      if (!payload.email) return 'Please enter your email address.';
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(payload.email)) return 'Please enter a valid email address.';

      if (!payload.course_program) return 'Please select your course / program.';
      if (payload.confirm_interest !== 'on') return 'Please confirm your interest to join the selected course/program.';

      return null;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearStatus();

      const fd = new FormData(form);
      const payload = Object.fromEntries(fd.entries());

      const err = validate(payload);
      if (err) {
        setStatus('err', err);
        statusEl.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
        return;
      }

      submitBtn.disabled = true;
      const oldText = submitBtn.textContent;
      submitBtn.textContent = 'Submitting...';

      try {
        const res = await fetch('/api/registrations/intake', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const json = await res.json().catch(() => ({}));
        if (!res.ok || json.success === false) {
          throw new Error(json.error || 'Submission failed. Please try again.');
        }

        setStatus('ok', 'Thank you. Your registration has been submitted successfully. We will contact you soon.');
        statusEl.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
        form.reset();
      } catch (error) {
        setStatus('err', error.message || 'Something went wrong. Please try again.');
        statusEl.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = oldText;
      }
    });
  </script>
</body>
</html>
