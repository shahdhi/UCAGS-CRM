<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Online Registration Form | UCAGS</title>
  <link rel="icon" href="/favicon.png" />

  <style>
    :root {
      /* DESIGN SYSTEM */
      --bg: #ffffff;
      --text: #101828;
      --muted: #475467;

      /* Primary color: crm purple (existing brand purple used in CRM) */
      --primary: #592c88;
      --primary-hover: #6a3aa0;

      /* Accent color */
      --accent: #592C88;

      --input-border: #cccccc;
      --radius: 10px;
      --radius-input: 8px;

      --container: 980px;

      --shadow: 0 16px 40px rgba(16, 24, 40, 0.10);
      --ring: 0 0 0 4px rgba(89, 44, 136, 0.14);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, "Noto Sans", "Apple Color Emoji", "Segoe UI Emoji";
      font-weight: 500;
      line-height: 1.4;
    }

    .page {
      min-height: 100%;
      padding: 0 0 0;
      display: grid;
      place-items: start center;
      background: #ffffff;
    }

    .wrap {
      width: 100%;
      max-width: var(--container);
      padding: 0 16px;
    }

    /* Apple-like hero header: background image + overlay (NOT sticky) */
    .heroHeader {
      position: relative;
      width: 100vw;
      margin-left: calc(50% - 50vw);
      margin-right: calc(50% - 50vw);
      margin-bottom: 18px;
      padding: 44px 16px 26px;
      color: #fff;
      overflow: hidden;
      border-bottom: 1px solid rgba(255, 255, 255, 0.14);
      box-shadow: 0 24px 60px rgba(16, 24, 40, 0.12);
    }

    .heroHeader::before {
      content: "";
      position: absolute;
      inset: 0;
      background: url('/jYM5GYnXPS3zN6pxuFFY.webp') center / cover no-repeat;
      /* Parallax-driven transforms via CSS variables */
      transform: translate3d(0, var(--hero-bg-y, 0px), 0) scale(var(--hero-bg-scale, 1.03));
      filter: blur(1.5px);
      opacity: var(--hero-bg-opacity, 1);
      will-change: transform, opacity;
    }

    .heroHeader::after {
      content: "";
      position: absolute;
      inset: 0;
      /* purple overlay, but not too heavy */
      background:
        radial-gradient(900px 420px at 15% 0%, rgba(255, 255, 255, 0.10), transparent 55%),
        radial-gradient(900px 420px at 85% 20%, rgba(89, 44, 136, 0.28), transparent 60%),
        linear-gradient(135deg, rgba(89, 44, 136, 0.50), rgba(75, 35, 118, 0.50));
    }

    .heroHeader .inner {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: var(--container);
      margin: 0 auto;
      display: grid;
      justify-items: center;
      gap: 12px;
      transform: translate3d(0, var(--hero-fg-y, 0px), 0) scale(var(--hero-fg-scale, 1));
      opacity: var(--hero-fg-opacity, 1);
      will-change: transform, opacity;
    }

    .heroHeader .logo {
      width: min(620px, 92vw);
      max-height: 120px;
      height: auto;
      object-fit: contain;
      display: block;
      filter: drop-shadow(0 16px 30px rgba(0,0,0,0.30));
    }

    .heroHeader .heading {
      text-align: center;
      display: grid;
      gap: 6px;
    }

    .heroHeader .kicker {
      font-family: "Times New Roman", Times, serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.86);
    }

    .heroHeader .title {
      margin: 0;
      font-family: "Times New Roman", Times, serif;
      font-size: clamp(34px, 5.8vw, 56px);
      line-height: 1.02;
      letter-spacing: 0.10em;
      font-weight: 800;
      text-transform: uppercase;
      color: #fff;
      text-shadow: 0 14px 30px rgba(0,0,0,0.28);
    }

    @media (min-width: 720px) {
      .heroHeader { padding: 58px 16px 34px; }
      .heroHeader .logo { max-height: 140px; }
    }

    /* FORM CONTAINER */
    .card {
      background: transparent;
      border-radius: 0;
      box-shadow: none;
      border: 0;
      padding: 12px 0 24px;
    }

    .cardTitle {
      font-family: "Times New Roman", Times, serif;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0;
      color: #101828;
      margin: 0 0 18px;
    }

    @media (max-width: 520px) {
      .card { padding: 22px 18px; }
    }

    form {
      display: grid;
      gap: 18px; /* 16–20px spacing between fields */
    }

    .field {
      display: grid;
      gap: 8px;
    }

    label {
      font-size: 14px;
      font-weight: 700;
      color: #1d2939;
    }

    .req {
      color: #b42318;
      font-weight: 900;
      margin-left: 2px;
    }

    input, select {
      width: 100%;
      height: 40px;
      padding: 8px 12px;
      border: 1px solid var(--input-border);
      border-radius: var(--radius-input);
      font-size: 14px;
      font-weight: 500;
      background: #fff;
      outline: none;
    }

    /* Modern date input styling (popup is browser-native; field can be styled) */
    input[type="date"] {
      appearance: none;
      -webkit-appearance: none;
      padding-right: 42px;
      background-image:
        radial-gradient(circle at 22px 50%, rgba(89,44,136,0.12) 0 10px, transparent 11px),
        linear-gradient(180deg, rgba(255,255,255,0.0), rgba(255,255,255,0.0));
      background-position: calc(100% - 16px) 50%, 0 0;
      background-size: 24px 24px, 100% 100%;
      background-repeat: no-repeat;
      cursor: pointer;
    }

    /* Calendar icon (Chrome/Edge/Safari) */
    input[type="date"]::-webkit-calendar-picker-indicator {
      opacity: 0.85;
      cursor: pointer;
      filter: invert(16%) sepia(16%) saturate(2200%) hue-rotate(240deg) brightness(92%) contrast(92%);
    }

    input[type="date"]:hover::-webkit-calendar-picker-indicator {
      opacity: 1;
    }

    /* Modern select styling (website-like, not browser default) */
    select {
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
      padding-right: 42px;
      background-image:
        linear-gradient(45deg, transparent 50%, rgba(16,24,40,0.70) 50%),
        linear-gradient(135deg, rgba(16,24,40,0.70) 50%, transparent 50%),
        linear-gradient(to right, transparent, transparent);
      background-position:
        calc(100% - 18px) 50%,
        calc(100% - 12px) 50%,
        0 0;
      background-size:
        6px 6px,
        6px 6px,
        100% 100%;
      background-repeat: no-repeat;
    }

    /* Hide default arrow in older IE/Edge */
    select::-ms-expand { display: none; }

    select:disabled {
      background-color: rgba(16,24,40,0.04);
      color: rgba(16,24,40,0.55);
    }

    input:focus, select:focus {
      border-color: rgba(89, 44, 136, 0.55);
      box-shadow: var(--ring);
    }

    input::placeholder { color: rgba(71, 84, 103, 0.75); }

    .two {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
    }

    /* Confirmation */
    .confirm {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      padding: 12px 12px;
      border: 1px solid rgba(89, 44, 136, 0.18);
      background: rgba(89, 44, 136, 0.04);
      border-radius: 10px;
    }

    .confirm input[type="checkbox"] {
      width: 18px;
      height: 18px;
      margin-top: 2px;
      accent-color: var(--primary);
    }

    .confirm label {
      font-weight: 600;
      color: #344054;
      line-height: 1.35;
    }

    /* Submit */
    .actions {
      display: flex;
      justify-content: flex-end;
      padding-top: 4px;
    }

    .actions .btn {
      width: 100%;
    }

    .btn {
      height: 46px;
      padding: 0 18px;
      border: 0;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 800;
      background: var(--primary);
      color: #fff;
      transition: background 120ms ease, transform 120ms ease, box-shadow 120ms ease;
      width: 100%;
      max-width: none; /* full width */
    }

    .btn:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
      box-shadow: 0 12px 24px rgba(89, 44, 136, 0.20);
    }

    .btn:active {
      background: #7a4bb0;
      transform: translateY(0);
      box-shadow: 0 8px 18px rgba(89, 44, 136, 0.18);
    }

    .btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* Status messages */
    .status {
      display: none;
      padding: 12px 12px;
      border-radius: 10px;
      font-size: 13px;
      line-height: 1.45;
    }

    .status.ok {
      display: block;
      background: #ecfdf3;
      color: #067647;
      border: 1px solid #abefc6;
    }

    .status.err {
      display: block;
      background: #fef3f2;
      color: #b42318;
      border: 1px solid #fecdca;
    }

    .footer {
      width: 100vw;
      margin-left: calc(50% - 50vw);
      margin-right: calc(50% - 50vw);
      background: var(--primary);
      color: rgba(255, 255, 255, 0.92);
      padding: 14px 16px;
      margin-top: 26px;
      position: relative;
      overflow: hidden;
      font-family: Verdana, Geneva, Tahoma, sans-serif;
      font-weight: 400;
    }

    /* Subtle footer background image */
    .footer::before {
      content: "";
      position: absolute;
      inset: 0;
      background: url('https://img.freepik.com/premium-photo/graduation-ceremony-procession-with-graduates-caps-gowns-sunlit-trees_416256-42760.jpg') center / cover no-repeat;
      opacity: 0.12;
      filter: saturate(110%) contrast(105%);
      transform: scale(1.04);
      z-index: 0;
    }

    /* Purple overlay to keep text readable */
    .footer::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(89, 44, 136, 0.78), rgba(89, 44, 136, 0.92));
      z-index: 0;
    }

    .footer .inner {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: var(--container);
      margin: 0 auto;
      display: grid;
      gap: 10px;
    }

    .footer .brandRow {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 12px;
    }

    .footer .brandRow img {
      width: 248px;
      height: 248px;
      object-fit: contain;
      background: transparent;
      border-radius: 0;
      padding: 0;
      display: block;
    }

    @media (max-width: 560px) {
      .footer .brandRow img {
        width: 160px;
        height: 160px;
      }
    }

    .footer .contact {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      align-items: center;
      gap: 6px 10px;
      font-size: 13px;
      line-height: 1.35;
      opacity: 0.95;
    }

    .footer .contact .block {
      font-weight: 400;
      white-space: normal;
      overflow: visible;
      text-overflow: initial;
    }

    .footer .contact .block:nth-child(1) { text-align: left; }
    .footer .contact .block:nth-child(2) { text-align: center; }
    .footer .contact .block:nth-child(3) { text-align: right; }

    @media (max-width: 760px) {
      .footer .contact {
        grid-template-columns: 1fr;
      }
      .footer .contact .block {
        white-space: normal;
        text-overflow: initial;
      }
      .footer .contact .block:nth-child(1),
      .footer .contact .block:nth-child(2),
      .footer .contact .block:nth-child(3) {
        text-align: left;
      }
    }

    .footer .bottom {
      margin-top: 6px;
      padding-top: 10px;
      border-top: 1px solid rgba(255, 255, 255, 0.22);
      text-align: center;
      font-size: 13px;
      font-weight: 400;
      opacity: 0.95;
    }
  </style>
</head>

<body>
  <div class="page">
    <header class="heroHeader" role="banner" aria-label="UCAGS Registration">
      <div class="inner">
        <img class="logo" src="/ucags_register_files/Unversal-logo-2025-05-16.png" alt="UCAGS" />
        <div class="heading">
          <div class="kicker">Quick &amp; Easy</div>
          <h1 class="title">Registration</h1>
        </div>
      </div>
    </header>

    <div class="wrap">

      <section class="card" aria-label="Online Registration Form">
        <div class="cardTitle">Online Registration Form</div>
        <form id="registrationForm" novalidate>
          <div class="field">
            <label for="fullName">Full Name<span class="req">*</span></label>
            <input id="fullName" name="name" type="text" autocomplete="name" required />
          </div>

          <div class="two">
            <div class="field">
              <label for="gender">Gender</label>
              <select id="gender" name="gender">
                <option value="">Select Gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
              </select>
            </div>

            <div class="field">
              <label for="dob">Date of Birth<span class="req">*</span></label>
              <input id="dob" name="date_of_birth" type="date" required />
            </div>
          </div>

          <div class="field">
            <label for="address">Address<span class="req">*</span></label>
            <input id="address" name="address" type="text" autocomplete="street-address" required />
          </div>

          <div class="field">
            <label for="country">Country<span class="req">*</span></label>
            <input id="country" name="country" type="text" autocomplete="country-name" required />
          </div>

          <div class="two">
            <div class="field">
              <label for="phone">Phone Number<span class="req">*</span></label>
              <input id="phone" name="phone_number" type="tel" autocomplete="tel" required />
            </div>

            <div class="field">
              <label for="whatsapp">WhatsApp Number</label>
              <input id="whatsapp" name="wa_number" type="tel" autocomplete="tel" />
            </div>
          </div>

          <div class="field">
            <label for="email">Email Address<span class="req">*</span></label>
            <input id="email" name="email" type="email" autocomplete="email" required />
          </div>

          <div class="two">
            <div class="field">
              <label for="workingStatus">Working Status</label>
              <select id="workingStatus" name="working_status">
                <option value="">Select Working Status</option>
                <option value="Working">Working</option>
                <option value="Student">Student</option>
              </select>
            </div>

            <div class="field">
              <label for="course">Course / Program<span class="req">*</span></label>
              <select id="course" name="course_program" required>
                <option value="">Select Your Course / Program</option>
                <option value="Diploma in Psychology">Diploma in Psychology</option>
                <option value="Diploma in Business & Entrepreneurship">Diploma in Business & Entrepreneurship</option>
                <option value="Diploma in Event Management">Diploma in Event Management</option>
                <option value="Diploma in Teaching">Diploma in Teaching</option>
                <option value="Diploma in Special Need Education & Shadow Teaching">Diploma in Special Need Education & Shadow Teaching</option>
              </select>
            </div>
          </div>

          <div class="confirm">
            <input id="confirmCourse" name="confirm_interest" type="checkbox" required />
            <label for="confirmCourse">
              I am interested to join the above selected Course/Program<span class="req">*</span>
            </label>
          </div>

          <div id="status" class="status" role="status" aria-live="polite"></div>

          <div class="actions">
            <button id="submitBtn" class="btn" type="submit">Submit</button>
          </div>
        </form>
      </section>

      <footer class="footer" aria-label="Footer">
        <div class="inner">
          <div class="brandRow">
            <img src="/ucags_register_files/Unversal-logo-2025-05-16.png" alt="UCAGS" />
          </div>

          <div class="contact">
            <div class="block">Hotline: +94763313333</div>
            <div class="block">190A, Allen Avenue, Dehiwala, Colombo,&nbsp;Sri&nbsp;Lanka</div>
            <div class="block">Email: study@ucags.edu.lk</div>
          </div>

          <div class="bottom">Copyright © <span id="year"></span> UCAGS. All rights reserved.</div>
        </div>
      </footer>
    </div>
  </div>

  <script>
    // Liquid / parallax scroll motion inspired by Apple.com
    // Uses requestAnimationFrame + CSS variables (no layout thrash). Respects reduced-motion.
    const hero = document.querySelector('.heroHeader');
    const prefersReduced = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    if (hero && !prefersReduced) {
      let raf = 0;
      const update = () => {
        raf = 0;
        const y = Math.max(0, window.scrollY || 0);
        const h = hero.offsetHeight || 1;
        const t = Math.min(1, y / Math.max(1, h)); // 0..1

        // background moves slower, slight scale down
        const bgY = Math.round(y * 0.22);
        const bgScale = 1.03 - (t * 0.02);
        const bgOpacity = 1 - (t * 0.12);

        // foreground gently drifts up and fades a touch
        const fgY = Math.round(-t * 10);
        const fgScale = 1 - (t * 0.015);
        const fgOpacity = 1 - (t * 0.18);

        hero.style.setProperty('--hero-bg-y', bgY + 'px');
        hero.style.setProperty('--hero-bg-scale', bgScale.toFixed(4));
        hero.style.setProperty('--hero-bg-opacity', bgOpacity.toFixed(4));

        hero.style.setProperty('--hero-fg-y', fgY + 'px');
        hero.style.setProperty('--hero-fg-scale', fgScale.toFixed(4));
        hero.style.setProperty('--hero-fg-opacity', fgOpacity.toFixed(4));
      };

      const onScroll = () => {
        if (raf) return;
        raf = requestAnimationFrame(update);
      };

      window.addEventListener('scroll', onScroll, { passive: true });
      window.addEventListener('resize', onScroll);
      update();
    }

    const form = document.getElementById('registrationForm');
    const statusEl = document.getElementById('status');
    const submitBtn = document.getElementById('submitBtn');

    document.getElementById('year').textContent = new Date().getFullYear();

    function setStatus(type, message) {
      statusEl.className = `status ${type}`;
      statusEl.textContent = message;
    }

    function clearStatus() {
      statusEl.className = 'status';
      statusEl.textContent = '';
      statusEl.style.display = 'none';
      // Re-apply display via classes for ok/err
      statusEl.removeAttribute('style');
    }

    function normalizePhone(value) {
      if (!value) return '';
      return String(value).trim();
    }

    function validate(payload) {
      if (!payload.name) return 'Please enter your full name.';
      if (!payload.date_of_birth) return 'Please select your date of birth.';
      if (!payload.address) return 'Please enter your address.';
      if (!payload.country) return 'Please enter your country.';

      const phone = normalizePhone(payload.phone_number);
      if (!phone) return 'Please enter your phone number.';
      if (phone.replace(/\D/g, '').length < 9) return 'Please enter a valid phone number.';

      if (!payload.email) return 'Please enter your email address.';
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(payload.email)) return 'Please enter a valid email address.';

      if (!payload.course_program) return 'Please select your course / program.';
      if (payload.confirm_interest !== 'on') return 'Please confirm your interest to join the selected course/program.';

      return null;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearStatus();

      const fd = new FormData(form);
      const payload = Object.fromEntries(fd.entries());

      const err = validate(payload);
      if (err) {
        setStatus('err', err);
        statusEl.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
        return;
      }

      submitBtn.disabled = true;
      const oldText = submitBtn.textContent;
      submitBtn.textContent = 'Submitting...';

      try {
        const res = await fetch('/api/registrations/intake', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const json = await res.json().catch(() => ({}));
        if (!res.ok || json.success === false) {
          throw new Error(json.error || 'Submission failed. Please try again.');
        }

        setStatus('ok', 'Thank you. Your registration has been submitted successfully. We will contact you soon.');
        statusEl.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
        form.reset();
      } catch (error) {
        setStatus('err', error.message || 'Something went wrong. Please try again.');
        statusEl.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = oldText;
      }
    });
  </script>
</body>
</html>
